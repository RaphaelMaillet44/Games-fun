<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life To Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../style/to-do-list.css">

</head>
<body>
<nav class="navbar navbar-light bg-light shadow p-2">
    <span><a href="../index.html"><h1 class="h1">MMI.FUN</h1></a></span>
  <span class="mx-auto flex-grow"><h1>Life To Do List</h1></span>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center" id="tasks-container">
    </div>
    <div class="row justify-content-center mt-4">
        <h4 class="col-12 text-center fw-bold" id="progress-text">Progression: 0/27</h4>
        <div class="progress">
  <div class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
</div>
    </div>
</div>
    <script>
        const container = document.getElementById("tasks-container");
        let progress = 0;

        const tasksData = [
            {"tache": "Naître"},
            {"tache": "Faire ses premiers pas"},
            {"tache": "Dire ses premiers mots"},
            {"tache": "Apprendre à lire"},
            {"tache": "Se faire un ami"},
            {"tache": "Apprendre le vélo"},
            {"tache": "Lire un livre"},
            {"tache": "Finir l'école"},
            {"tache": "Obtenir son brevet"},
            {"tache": "Pratiquer un sport"},
            {"tache": "Prendre la voiture"},
            {"tache": "Prendre le train"},
            {"tache": "Prendre l'avion"},
            {"tache": "Prendre le bateau"},
            {"tache": "Voir la neige"},
            {"tache": "Voir la mer"},
            {"tache": "Obtenir son BAC"},
            {"tache": "Aller à un concert"},
            {"tache": "Jouer un instrument"},
            {"tache": "Faire des études supérieur"},
            {"tache": "Etudier en BUT MMI ;)"},
            {"tache": "Obtenir un diplôme"},
            {"tache": "Décrocher un job"},
            {"tache": "Apprendre une langue"},
            {"tache": "Rencontrer quelqu'un"},
            {"tache": "Se mettre en couple"},
            {"tache": "Se marier"}
        ];
        let task = '';
        let progressbar = document.querySelector('.progress-bar');
        tasksData.forEach((element, index) => {
            task += `<div class="task col-lg-4 col-md-6 col-sm-6 col-xs-12 shadow m-1 p-3 "><span class="class="checkbox-wrapper" p-3"><input type="checkbox" name="check" id="check"  onchange="updateProgress(this)"></span><span><h3>${element.tache}</h3></span></div>`;
        });
        container.innerHTML = task;
        let counter = document.getElementById("progress-text");
        function updateProgress(checkbox) {
            console.log("Checkbox state changed:", checkbox.checked);
            if (checkbox.checked) {
                progress += 1;
                progressbar.style.width = progress * 3.703703703703704 + '%';
                counter.innerHTML = "Progression: " + progress + "/27";
            } else {
                progress -= 1;
                progressbar.style.width = progress * 3.703703703703704 + '%';
                counter.innerHTML = "Progression: " + progress + "/27";
            }
            console.log("Current progress:", progress);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
