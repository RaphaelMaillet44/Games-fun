<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Snake</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; }
        canvas { border: 5px solid #ecf0f1; background: #000; }
    </style>
</head>
<body>
    <h1>Snake Retro</h1>
    <div id="score">Score : 0</div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;

        let snake = [{ x: 9 * box, y: 10 * box }]; // Le serpent commence avec un seul segment
        let food = { x: 5 * box, y: 5 * box };     // Position de départ de la nourriture
        let d;                                     // Direction
    
        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dessiner le serpent
            snake.forEach((segment, index) => {
                ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(segment.x, segment.y, box, box);
            });
        
            // Dessiner la nourriture
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);
            }
            let game = setInterval(draw, 100);
    </script>
</body>
</html>
